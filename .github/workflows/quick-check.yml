name: Public package quick verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify frozen public package
        run: python quick_verify.py
      - name: Run lightweight unit tests
        run: python -m unittest discover -s tests -v
